# Nixpacks configuration for Railway deployment
# Chromium is required by lib/services/pdf-html-service.ts (HTML -> PDF via puppeteer-core).
# It will be removed once we consolidate PDF generation onto pdfkit (Phase 3B).

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "libuuid"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/var/nix/profiles/default/bin/chromium"
